version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=wallet
      - POSTGRES_PASSWORD=wallet
      - POSTGRES_DB=walletdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d walletdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8081:8081"

  wallet-service:
    build:
      context: ../..
      dockerfile: services/wallet-service/Dockerfile
    environment:
      - CLIENTS_USER_BASE_URL=http://user-service:8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/walletdb
      - SPRING_DATASOURCE_USERNAME=wallet
      - SPRING_DATASOURCE_PASSWORD=wallet
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  transaction-service:
    build:
      context: ../..
      dockerfile: services/transaction-service/Dockerfile
    environment:
      - CLIENTS_WALLET_BASE_URL=http://wallet-service:8082
    ports:
      - "8083:8083"
    depends_on:
      - wallet-service

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
