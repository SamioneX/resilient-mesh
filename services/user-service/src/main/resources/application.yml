server:
  port: 8081

spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: ${APP_VIRTUAL_THREADS_ENABLED:true}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: ${spring.application.name}
